name: Build and Release

# Only run this pipeline when you publish a new Release tag in GitHub
on:
  release:
    types: [created]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22' # Use your current Go version

      - name: Build Binary
        # Builds the optimized Windows executable
        run: go build -ldflags="-s -w" -o registry-mcp.exe

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: registry-mcp.exe
